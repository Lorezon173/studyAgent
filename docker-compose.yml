services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: study-agent-dev
    env_file:
      - .env
    ports:
      - "1900:1900"
      - "2554:2554"
    volumes:
      - .:/workspace
      - ./data:/workspace/data
    command: bash /workspace/startup/dev-start.sh
